<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // 1. Connection Test
      // alert('Pantry Bloom: HTML Loaded');
      
      // 2. Immediate Error Catcher (Catches module load failures)
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        alert("CRITICAL ERROR: " + msg + "\nAt: " + url + ":" + lineNo);
        return false;
      };
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantry Bloom</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <meta name="apple-mobile-web-app-title" content="Pantry Bloom" />
    <meta name="application-name" content="Pantry Bloom" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Outfit', sans-serif; }
      .font-serif-luxury { font-family: 'Playfair Display', serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => {
              console.log('SW Registered', reg);
              // alert('PWA: Ready to Bloom! (SW Active)');
            })
            .catch(err => {
              console.log('SW Registration Failed', err);
              alert('PWA Error: ' + err.message);
            });
        });
      }
    </script>
  </body>
</html>
